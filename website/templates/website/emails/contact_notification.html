<!DOCTYPE html>
<html>
<head><meta charset="UTF-8"></head>
<body style="font-family: Arial, sans-serif; background: #f5f3ef; padding: 24px;">
    <div style="max-width: 560px; margin: 0 auto; background: #fff; border-top: 4px solid #D4AF37; padding: 32px; border-radius: 8px;">
        <h2 style="color: #1B2A41; margin-top: 0;">New Contact Request</h2>
        <table style="width: 100%; color: #5A6B7D; font-size: 14px;">
            <tr><td style="padding: 6px 0;"><strong>Name:</strong></td><td>{{ message.name }}</td></tr>
            <tr><td style="padding: 6px 0;"><strong>Email:</strong></td><td><a href="mailto:{{ message.email }}">{{ message.email }}</a></td></tr>
            <tr><td style="padding: 6px 0;"><strong>Phone:</strong></td><td>{{ message.phone|default:"—" }}</td></tr>
            <tr><td style="padding: 6px 0;"><strong>Subject:</strong></td><td>{{ message.subject }}</td></tr>
        </table>
        <hr style="border: none; border-top: 1px solid #EDE9E1; margin: 16px 0;">
        <p style="color: #5A6B7D; line-height: 1.6; white-space: pre-wrap;">{{ message.message }}</p>
        <p style="color: #8A9BAE; font-size: 12px;">View all messages in the Django admin panel.</p>
    </div>
</body>
</html>
