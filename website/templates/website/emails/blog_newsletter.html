<!DOCTYPE html>
<html>
<head><meta charset="UTF-8"></head>
<body style="font-family: Arial, sans-serif; background: #f5f3ef; padding: 24px;">
    <div style="max-width: 560px; margin: 0 auto; background: #fff; border-top: 4px solid #D4AF37; padding: 32px; border-radius: 8px;">
        <p style="color: #D4AF37; font-size: 12px; letter-spacing: 2px; text-transform: uppercase; margin-top: 0;">New Blog Post</p>
        <h2 style="color: #1B2A41; margin-top: 0;">{{ post.title }}</h2>
        {% if post.cover_image_absolute %}
        <img src="{{ post.cover_image_absolute }}" alt="{{ post.title }}" style="width: 100%; max-height: 240px; object-fit: cover; border-radius: 8px; margin-bottom: 16px;">
        {% endif %}
        <p style="color: #5A6B7D; line-height: 1.6;">{{ post.excerpt }}</p>
        <p style="color: #8A9BAE; font-size: 13px;">By {{ post.author }}</p>
        <a href="{{ blog_url }}" style="display: inline-block; margin-top: 16px; padding: 12px 28px; background: linear-gradient(135deg, #E2C685, #D4AF37); color: #1B2A41; text-decoration: none; font-weight: bold; border-radius: 4px;">Read Full Article</a>
        <hr style="border: none; border-top: 1px solid #EDE9E1; margin: 24px 0;">
        <p style="color: #8A9BAE; font-size: 12px;">{{ site_name }} · Addis Ababa, Ethiopia</p>
    </div>
</body>
</html>
